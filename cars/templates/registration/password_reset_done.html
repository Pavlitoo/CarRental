{% extends 'cars/base.html' %}

{% block title %}Лист відправлено | CarRental{% endblock %}

{% block content %}
<div class="container py-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4 bg-white p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-mailbox text-success display-1 opacity-75"></i>
                </div>
                <h2 class="fw-bold text-dark mb-3">Перевірте пошту!</h2>
                <p class="text-muted fs-5 mb-4" style="line-height: 1.6;">
                    Ми надіслали вам email з інструкціями щодо скидання пароля. Якщо лист не прийшов протягом кількох хвилин, перевірте папку "Спам".
                </p>
                <a href="/accounts/login/" class="btn btn-outline-secondary btn-lg rounded-pill fw-semibold px-4">Повернутися до входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
