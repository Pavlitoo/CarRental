{% extends 'cars/base.html' %}

{% block title %}Пароль змінено | CarRental{% endblock %}

{% block content %}
<div class="container py-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4 bg-white p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-primary display-1 opacity-75"></i>
                </div>
                <h2 class="fw-bold text-dark mb-3">Пароль успішно змінено!</h2>
                <p class="text-muted fs-5 mb-4" style="line-height: 1.6;">
                    Ваш пароль було успішно оновлено. Тепер ви можете увійти у свій акаунт, використовуючи нові дані.
                </p>
                <a href="/accounts/login/" class="btn btn-primary btn-lg rounded-pill fw-bold px-5 shadow">Увійти в систему</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
