{% extends 'cars/base.html' %}

{% block content %}
    <h1 class="text-center mb-4">Наш автопарк</h1>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for car in cars %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                {% if car.image %}
                    <img src="{{ car.image.url }}" class="card-img-top" alt="{{ car.brand }}" style="height: 200px; object-fit: cover;">
                {% else %}
                    <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                        Немає фото
                    </div>
                {% endif %}
                
                <div class="card-body">
                    <h5 class="card-title">{{ car.brand }} {{ car.model }}</h5>
                    <p class="card-text text-success fw-bold">{{ car.price_per_day }} грн <small class="text-muted">/ доба</small></p>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'car_detail' car.pk %}" class="btn btn-primary">
                            Детальніше / Забронювати
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
