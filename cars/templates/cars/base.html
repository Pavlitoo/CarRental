<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'car_list' %}">🚖 CarRental</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="nav-item nav-link text-white me-3">👤 {{ user.username }}</span>
                    
                    <a class="nav-link btn btn-outline-light btn-sm text-white px-3 me-2" href="{% url 'my_bookings' %}">
                        Мої бронювання
                    </a>

                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link text-secondary" style="text-decoration: none;">Вийти</button>
                    </form>

                {% else %}
                    <a class="nav-item nav-link" href="{% url 'login' %}">Увійти</a>
                    <a class="nav-item nav-link fw-bold text-warning" href="{% url 'signup' %}">Реєстрація</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        &copy; 2026 CarRental System. Курсова робота.
    </footer>

</body>
</html>
