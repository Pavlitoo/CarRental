<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRental - Курсова Павла Романовича</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Стилі наведення для шапки */
        .navbar-dark .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            transition: all 0.2s ease-in-out;
            border-radius: 5px;
        }

        .navbar-dark .navbar-nav .nav-link:hover {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.1) !important;
        }

        .navbar-dark .navbar-nav .nav-link.active {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.2) !important;
            font-weight: bold;
        }
        
        /* Зручні відступи для мобільного меню */
        @media (max-width: 991.98px) {
            .navbar-nav {
                padding-top: 10px;
                padding-bottom: 10px;
            }
            .navbar-nav .nav-item {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'car_list' %}">
                <i class="bi bi-car-front-fill me-2"></i> CarRental
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'car_list' %}">Пошук авто</a>
                    </li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'my_bookings' %}">Мої бронювання</a>
                        </li>
                        
                        {% if user.is_staff %}
                            <li class="nav-item">
                                <a class="nav-link px-3 text-warning fw-bold" href="{% url 'dashboard' %}">
                                    <i class="bi bi-bar-chart-fill me-1"></i> Аналітика
                                </a>
                            </li>
                        {% endif %}
                        
                        <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                            <form action="{% url 'logout' %}" method="post" class="d-inline w-100">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm w-100 text-start text-lg-center">
                                    <i class="bi bi-box-arrow-right me-1"></i> Вихід ({{ user.username }})
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link px-3" href="{% url 'login' %}">Вхід</a>
                        </li>
                        <li class="nav-item ms-lg-2 mt-3 mt-lg-0">
                            <a class="btn btn-primary btn-sm w-100" href="{% url 'signup' %}">Реєстрація</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
